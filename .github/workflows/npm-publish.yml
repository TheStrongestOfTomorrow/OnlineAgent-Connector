name: Publish to npm + GitHub Packages

# Triggers when a version tag (v2.2.0, v2.3.0, …) is pushed.
# Publishes the SAME code under TWO names:
#   - npm:                online-agent                          (unscoped, primary)
#   - GitHub Packages:    @thestrongestoftomorrow/online-agent (scoped, fallback for 2FA-locked users)
#
# Why both? npm's "trusted publisher" (OIDC) feature requires 2FA on the
# publishing account. GitHub Packages only needs a PAT — no 2FA. By publishing
# to both, users who can't use npm (e.g. can't do 2FA) still have a working
# install path via GitHub Packages.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write       # required for npm provenance signing
  packages: write       # required to publish to GitHub Packages

jobs:
  test:
    name: Run test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test

  publish:
    name: Publish to both registries
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify package version matches tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag ($TAG) does not match package.json version ($PKG)"
            exit 1
          fi
          echo "Releasing $PKG"

      - run: npm ci

      # ---------- 1. Publish to npm ----------
      - name: Publish to npm (online-agent)
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ---------- 2. Publish to GitHub Packages ----------
      # GitHub Packages requires scoped names, so we temporarily rename
      # the package to @thestrongestoftomorrow/online-agent, publish,
      # then restore the original package.json.
      - name: Publish to GitHub Packages (@thestrongestoftomorrow/online-agent)
        run: |
          cp package.json package.json.bak
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            p.name = '@thestrongestoftomorrow/online-agent';
            p.publishConfig = { access: 'public', registry: 'https://npm.pkg.github.com' };
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "
          npm publish --access public --registry=https://npm.pkg.github.com
          cp package.json.bak package.json
          rm package.json.bak
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            LICENSE
            README.md
