name: Publish to npm

# Triggers when a version tag (v2.1.0, v2.2.0, …) is pushed.
# Uses npm's provenance feature (OIDC trusted publishing) so no
# long-lived npm tokens are needed in the repo — the NPM_TOKEN secret
# is a granular, package-scoped access token that's only used inside
# this workflow run, never exposed to logs, and rotated annually.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:        # allow manual runs from the Actions tab

# Permissions required for OIDC provenance signing.
permissions:
  contents: read
  id-token: write

jobs:
  test:
    name: Run test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test

  publish:
    name: Publish to npmjs.org
    needs: test
    runs-on: ubuntu-latest
    environment: npm-publish     # requires manual approval if you set required reviewers on the environment
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify package version matches tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag ($TAG) does not match package.json version ($PKG)"
            exit 1
          fi
          echo "Releasing $PKG"

      - run: npm ci

      # --provenance attaches a signed, publicly-verifiable statement
      # to the published artifact linking it back to this exact workflow
      # run + commit. See https://docs.npmjs.com/generating-provenance-statements
      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            LICENSE
            README.md
